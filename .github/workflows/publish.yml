name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Gate: lint + validate before anything is published ───────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Lint spec
        run: npm run lint

      - name: Validate spec
        run: npm run validate

  # ── TypeScript client → GitHub Packages (npm) ───────────────────────────────
  publish-typescript:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@glebremniov"
          cache: "npm"

      - run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate TypeScript client
        run: |
          npx openapi-generator-cli generate \
            -i specs/openapi.yaml \
            -g typescript-axios \
            -o generated/typescript \
            -c config/typescript-axios.yaml \
            --additional-properties=npmVersion=${{ steps.version.outputs.VERSION }}

      - name: Publish to GitHub Packages
        working-directory: generated/typescript
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Java Spring server stubs → GitHub Packages (Maven) ──────────────────────
  publish-java:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate Java Spring stubs
        run: |
          npx openapi-generator-cli generate \
            -i specs/openapi.yaml \
            -g spring \
            -o generated/java \
            -c config/spring-server.yaml \
            --additional-properties=artifactVersion=${{ steps.version.outputs.VERSION }}

      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish to GitHub Packages
        working-directory: generated/java
        run: |
          mvn deploy \
            -DaltDeploymentRepository="github::https://maven.pkg.github.com/glebremniov/budget-buddy-contracts" \
            --no-transfer-progress \
            -DskipTests
