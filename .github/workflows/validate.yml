name: Validate

on:
  pull_request:
    paths:
      - "specs/**"
      - "config/**"
      - ".spectral.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint spec
        run: pnpm run lint

      - name: Validate spec
        run: pnpm run validate
