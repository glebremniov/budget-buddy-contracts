name: Validate

on:
  pull_request:
    paths:
      - "specs/**"
      - "config/**"
      - ".spectral.yaml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Lint spec
        run: npm run lint

      - name: Validate spec
        run: npm run validate
