name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@glebremniov"
          cache: "pnpm"

      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - run: pnpm install --frozen-lockfile

      - name: Lint spec
        run: pnpm run lint

      - name: Validate spec
        run: pnpm run validate

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      - name: Detect release
        id: detect
        run: |
          if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate TypeScript client
        if: steps.detect.outputs.released == 'true'
        run: |
          pnpm run generate:ts
          jq '.compilerOptions.moduleResolution = "node10" | .compilerOptions.ignoreDeprecations = "6.0"' \
            generated/typescript/tsconfig.json > /tmp/tsconfig.json
          mv /tmp/tsconfig.json generated/typescript/tsconfig.json
          jq '.compilerOptions.moduleResolution = "bundler"' \
            generated/typescript/tsconfig.esm.json > /tmp/tsconfig.esm.json
          mv /tmp/tsconfig.esm.json generated/typescript/tsconfig.esm.json

      - name: Publish TypeScript package
        if: steps.detect.outputs.released == 'true'
        working-directory: generated/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --no-git-checks

      - name: Generate Java Spring stubs
        if: steps.detect.outputs.released == 'true'
        run: pnpm run generate:java

      - name: Configure Maven for GitHub Packages
        if: steps.detect.outputs.released == 'true'
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish Java package
        if: steps.detect.outputs.released == 'true'
        working-directory: generated/java
        run: |
          mvn deploy \
            -DaltDeploymentRepository="github::https://maven.pkg.github.com/glebremniov/budget-buddy-contracts" \
            --no-transfer-progress \
            -DskipTests
